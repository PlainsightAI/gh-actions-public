name: "Open Mechanical PR"
description: |
  Opens a bot-authored pull request from working-tree changes (modifications
  and untracked files). Supersedes any open PRs whose head branch shares the
  configured prefix, commits + pushes a fresh branch named
  ${branch_prefix}${short_sha}-${github_run_id}, opens the PR, and (by
  default) enables native auto-merge. Idempotent: a clean working tree exits
  successfully without doing anything.

  Lifted from the supersede + push + create logic of client-portal's
  update-api-client.yaml so cascade workflows (openfilter, gh-actions, …)
  share one implementation.

inputs:
  repo:
    description: "Target consumer repo in owner/name form (e.g. PlainsightAI/filter-sam3-detector)."
    required: true
  branch_prefix:
    description: |
      Branch prefix for the bot PR head (e.g. bump-openfilter-, bump-gh-actions-).
      Used both for the new branch name (${branch_prefix}${short_sha}-${github_run_id})
      and to identify open predecessors to supersede. Pick a prefix unique to
      the cascade so unrelated bot PRs are not closed.
    required: true
  commit_message:
    description: "Commit message for the staged changes."
    required: true
  pr_title:
    description: "Pull request title."
    required: true
  pr_body:
    description: "Pull request body (markdown)."
    required: true
  gh_token:
    description: |
      GitHub token (plainsight-bot PAT) used for git push, PR creation,
      auto-merge enablement, and listing/closing prior PRs in the supersede
      step. Must have `repo` scope (or equivalent fine-grained
      `Pull requests: read+write` and `Contents: read+write`) on every repo
      this action targets.
    required: true
  auto_merge:
    description: "Set to 'false' to skip 'gh pr merge --auto'. Defaults to 'true'."
    required: false
    default: 'true'
  merge_method:
    description: "Merge method passed to 'gh pr merge --auto': squash | merge | rebase."
    required: false
    default: 'squash'
  base_branch:
    description: |
      Base branch the PR targets and the supersede step queries against.
      Defaults to `main`.
    required: false
    default: 'main'
  working_directory:
    description: "Path to the cloned consumer repo on the runner. Defaults to the current directory."
    required: false
    default: '.'

outputs:
  pr_url:
    description: "URL of the created pull request. Empty if the working tree was clean (no-op)."
    value: ${{ steps.create_pr.outputs.pr_url }}

runs:
  using: "composite"
  steps:
    - name: Configure git identity and check for changes
      id: precheck
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        MERGE_METHOD: ${{ inputs.merge_method }}
      run: |
        # Validate merge_method unconditionally — even when auto_merge is
        # 'false', so that a typo in test runs that disable auto-merge fails
        # fast rather than lurking until someone flips the flag.
        case "$MERGE_METHOD" in
          squash|merge|rebase) ;;
          *)
            echo "ERROR: invalid merge_method '$MERGE_METHOD' (expected squash|merge|rebase)."
            exit 1
            ;;
        esac

        git config user.name "plainsight-bot"
        git config user.email "cloudinfra@plainsight.ai"

        # Idempotency guard: a clean working tree means upstream's bump
        # strategy already converged (e.g. the consumer's pin already
        # satisfies the new version, or this run is a retry of a no-op).
        # Exit success and let downstream steps short-circuit on has_changes.
        # Use porcelain so untracked files (e.g. brand-new RELEASE.md) also
        # count as changes — git diff --quiet only checks tracked files.
        if [ -z "$(git status --porcelain)" ]; then
          echo "Working tree clean; nothing to commit."
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
        else
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Supersede stale predecessor PRs
      if: steps.precheck.outputs.has_changes == 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        REPO: ${{ inputs.repo }}
        BRANCH_PREFIX: ${{ inputs.branch_prefix }}
        BASE_BRANCH: ${{ inputs.base_branch }}
      run: |
        # Only one open cascade PR per prefix at a time. Filtering via jq
        # because gh pr list's --search head: qualifier is exact-match, not
        # prefix. --delete-branch keeps the remote tidy; superseded branches
        # have no other purpose. Pass the prefix via env (BRANCH_PREFIX) so
        # the jq query reads it from $ENV — never inline ${{ inputs.* }}
        # into a shell script (branch names can carry shell metacharacters).
        #
        # Run gh pr list as its own step rather than inline-piping into
        # mapfile: a process-substitution failure inside `mapfile -t … < <(…)`
        # is silently swallowed (mapfile returns 0 with an empty array), so
        # an auth-scope mismatch or transient API error would masquerade as
        # "no stale PRs" and let the cascade race against still-open
        # predecessors. The two-step form surfaces gh's exit code.
        #
        # On gh pr list failure: fail the shard rather than soft-fail. For
        # internal cascade targets with a scoped bot PAT, a non-zero exit
        # here means either a transient API blip (re-run clears it) or a
        # real bug (token scope, repo archived, repo renamed). Soft-failing
        # would let stale ${BRANCH_PREFIX}* PRs accumulate forever — the
        # supersede step silently never works while every cascade run opens
        # fresh PRs on top. Matrix callers should set fail-fast: false so
        # one shard's failure here doesn't block bumps to peers.
        if ! gh pr list \
              --repo "$REPO" \
              --state open \
              --base "$BASE_BRANCH" \
              --json number,headRefName \
              --jq '.[] | select(.headRefName | startswith(env.BRANCH_PREFIX)) | "\(.number)\t\(.headRefName)"' \
              > /tmp/stale_prs.txt; then
          echo "ERROR: failed to list open PRs in $REPO for supersede check."
          echo "ERROR: refusing to open a fresh PR on top of an unknown predecessor set."
          exit 1
        fi
        mapfile -t stale < /tmp/stale_prs.txt

        if [ "${#stale[@]}" -eq 0 ]; then
          echo "No stale ${BRANCH_PREFIX}* PRs to supersede."
          exit 0
        fi

        for entry in "${stale[@]}"; do
          [ -z "$entry" ] && continue
          num="${entry%%$'\t'*}"
          branch="${entry#*$'\t'}"
          echo "Closing #${num} (${branch}) — superseded by a fresh ${BRANCH_PREFIX} run."
          # Best-effort: a concurrent run may have already closed the PR;
          # don't let a 422 here abort the cascade.
          gh pr close "$num" \
            --repo "$REPO" \
            --delete-branch \
            --comment "Superseded by a fresh ${BRANCH_PREFIX} run." \
            || echo "WARN: failed to close #${num}; continuing."
        done

    - name: Commit and push branch
      id: push
      if: steps.precheck.outputs.has_changes == 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        REPO: ${{ inputs.repo }}
        BRANCH_PREFIX: ${{ inputs.branch_prefix }}
        COMMIT_MESSAGE: ${{ inputs.commit_message }}
      run: |
        SHORT_SHA=$(git rev-parse --short HEAD)
        # Append GITHUB_RUN_ID so two truly concurrent cascade runs against
        # an unchanged consumer main don't race on push with identical
        # branch names (SHORT_SHA alone is deterministic per HEAD, not per
        # run). A re-run of the SAME workflow run keeps the same RUN_ID, so
        # the PR-existence probe below still handles retry idempotency.
        BRANCH_NAME="${BRANCH_PREFIX}${SHORT_SHA}-${GITHUB_RUN_ID}"

        # -B (force-create) instead of -b: a re-entrant invocation in the
        # same workspace (rare, but possible on persistent self-hosted
        # runners that share a checkout across jobs) would otherwise error
        # with "branch already exists". Safe here since we're freshly
        # pushing this branch in the next command anyway.
        git checkout -B "$BRANCH_NAME"
        git add -A
        git commit -m "$COMMIT_MESSAGE"

        # Push using the token in the URL — avoids mutating global git
        # config (which `gh auth setup-git` would do persistently on
        # self-hosted runners by writing a credential helper into
        # ~/.gitconfig that survives across jobs and can interfere with
        # other workflows that authenticate differently). The
        # `http.extraheader=` override defeats any persisted Authorization
        # header left by actions/checkout in callers that share a workspace.
        git -c "http.https://github.com/.extraheader=" \
            push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "$BRANCH_NAME"

        echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

    - name: Create pull request
      id: create_pr
      if: steps.precheck.outputs.has_changes == 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        REPO: ${{ inputs.repo }}
        BASE_BRANCH: ${{ inputs.base_branch }}
        BRANCH_NAME: ${{ steps.push.outputs.branch_name }}
        PR_TITLE: ${{ inputs.pr_title }}
        PR_BODY: ${{ inputs.pr_body }}
      run: |
        # Probe for an existing PR for this exact branch first. A re-run of
        # the same workflow run reproduces the same SHORT_SHA + RUN_ID and
        # therefore the same BRANCH_NAME; the push above is a no-op or
        # fast-forward, but `gh pr create` would hard-fail with "a pull
        # request for branch X already exists". Reuse the existing PR
        # instead so retries are idempotent.
        PR_URL=$(gh pr list --repo "$REPO" --head "$BRANCH_NAME" --state open --json url --jq '.[0].url // ""')
        if [ -z "$PR_URL" ]; then
          PR_URL=$(gh pr create \
            --repo "$REPO" \
            --base "$BASE_BRANCH" \
            --head "$BRANCH_NAME" \
            --title "$PR_TITLE" \
            --body "$PR_BODY")
          echo "Opened: $PR_URL"
        else
          echo "Reusing existing PR: $PR_URL"
        fi
        echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

    - name: Enable native auto-merge
      if: steps.precheck.outputs.has_changes == 'true' && inputs.auto_merge == 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        PR_URL: ${{ steps.create_pr.outputs.pr_url }}
        MERGE_METHOD: ${{ inputs.merge_method }}
      run: |
        # Native auto-merge: GitHub merges as soon as required checks +
        # reviews pass. Branch protection on the consumer's main is the
        # source of truth for "what does merge readiness mean here":
        #   - required checks (tests + dry-run-publish) → merges on green
        #   - required reviews                          → waits for review
        #   - no protection at all                      → gh errors
        #
        # The unprotected case is a soft warning, not a failure: the PR
        # still exists, a human can merge it manually. Failing the cascade
        # over a missing branch protection rule would block bumps from
        # landing in repos that haven't completed the protection sweep yet.
        #
        # merge_method validation lives in the precheck step so a typo
        # fails fast even when auto_merge is 'false'.
        if ! gh pr merge --auto "--$MERGE_METHOD" "$PR_URL"; then
          echo "WARN: 'gh pr merge --auto --$MERGE_METHOD' failed for $PR_URL."
          echo "WARN: Likely cause: target branch has no protection rule, so auto-merge"
          echo "WARN: is not enabled for the repo. PR remains open for manual merge."
        fi
