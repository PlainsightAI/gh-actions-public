name: Filter Release

on:
  workflow_call:
    inputs:
      docker_image:
        description: Docker image name (for example plainsightai/openfilter-my-filter)
        required: true
        type: string
    secrets:
      PYPI_API_TOKEN:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

permissions:
  contents: write

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project dependencies
        run: make install

      - name: Run tests
        run: make test

  create-release:
    runs-on: ubuntu-latest
    needs: run-tests
    outputs:
      is_release_created: ${{ steps.release_meta.outputs.is_release_created }}
      version: ${{ steps.release_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Read release version from VERSION
        id: release_version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ -z "$version" ]]; then
            echo "VERSION file is empty."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check if release tag exists
        id: check_tag
        uses: mukunku/tag-exists-action@v1.7.0
        with:
          tag: ${{ steps.release_version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${{ steps.release_version.outputs.version }}" \
            --title "Release ${{ steps.release_version.outputs.version }}" \
            --generate-notes

      - name: Export release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${{ steps.check_tag.outputs.exists }}" == "false" ]]; then
            echo "is_release_created=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release_created=false" >> "$GITHUB_OUTPUT"
          fi

  publish-pypi:
    runs-on: ubuntu-latest
    needs: create-release
    if: needs.create-release.outputs.is_release_created == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install packaging tools
        run: python -m pip install --upgrade build twine

      - name: Build wheel
        run: python -m build --wheel

      - name: Publish wheel to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*.whl

  publish-docker:
    runs-on: ubuntu-latest
    needs: [create-release, publish-pypi]
    if: needs.create-release.outputs.is_release_created == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ inputs.docker_image }}:${{ needs.create-release.outputs.version }}
            ${{ inputs.docker_image }}:latest
