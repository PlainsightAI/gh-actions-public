name: Filter Release

on:
  workflow_call:
    inputs:
      docker_image:
        description: Docker image name (for example plainsightai/openfilter-my-filter)
        required: true
        type: string
      python_versions:
        description: JSON array of Python versions to test
        required: false
        type: string
        default: '["3.10", "3.11", "3.12", "3.13"]'
      dockerhub_username:
        description: Docker Hub username for image push
        required: false
        type: string
        default: plainsightai
    secrets:
      # Compatibility mode: keep these optional so legacy callers continue to work
      # while migrating. Canonical names are PYPI_API_TOKEN and DOCKERHUB_TOKEN.
      PYPI_API_TOKEN:
        required: false
      PLAINSIGHT_PYPI_TOKEN:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      DOCKERHUB_ACCESS_TOKEN:
        required: false

permissions:
  contents: write
  pull-requests: read

jobs:
  check-release-log:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate RELEASE.md on PRs to main
        shell: bash
        run: |
          if [[ ! -f RELEASE.md ]]; then
            echo "RELEASE.md is required for PRs to main."
            exit 1
          fi
          if [[ ! -s RELEASE.md ]]; then
            echo "RELEASE.md cannot be empty."
            exit 1
          fi
          if ! rg -n "^[[:space:]]*[#-]?[[:space:]]*v?[0-9]+\\.[0-9]+\\.[0-9]+([.-][0-9A-Za-z.-]+)?[[:space:]]*$" RELEASE.md >/dev/null; then
            echo "RELEASE.md must contain at least one semver version entry (e.g. 1.2.3)."
            exit 1
          fi

  run-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ${{ fromJSON(inputs.python_versions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          make install

      - name: Run tests
        run: make test

  create-release:
    runs-on: ubuntu-latest
    needs: run-tests
    outputs:
      is_release_created: ${{ steps.release_meta.outputs.is_release_created }}
      version: ${{ steps.release_meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run changelog parser
        id: changelog
        uses: PlainsightAI/changelog-parser-action@main
        with:
          path: RELEASE.md

      - name: Store changelog version
        run: echo "CHANGELOG_VERSION=${{ steps.changelog.outputs.version }}" >> "$GITHUB_ENV"
        shell: bash

      - name: Check VERSION file (if exists)
        shell: bash
        run: |
          if [[ -f "VERSION" ]]; then
            version_file="$(tr -d '[:space:]' < VERSION)"
            if [[ "$version_file" != "$CHANGELOG_VERSION" ]]; then
              echo "VERSION mismatch! VERSION file: $version_file, RELEASE.md: $CHANGELOG_VERSION"
              exit 1
            fi
          else
            echo "No VERSION file found, skipping version check."
          fi

      - name: Check if release tag exists
        id: check_tag
        uses: mukunku/tag-exists-action@v1.7.0
        with:
          tag: "${{ env.CHANGELOG_VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.description }}
        shell: bash
        run: |
          echo "$RELEASE_NOTES" > release-notes.md
          gh release create "${{ env.CHANGELOG_VERSION }}" \
            --title "Release ${{ env.CHANGELOG_VERSION }}" \
            --notes-file release-notes.md

      - name: Export release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${{ steps.check_tag.outputs.exists }}" == "false" ]]; then
            echo "is_release_created=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release_created=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${{ env.CHANGELOG_VERSION }}" >> "$GITHUB_OUTPUT"

  prepare-pypi-publish:
    runs-on: ubuntu-latest
    needs: create-release
    if: needs.create-release.outputs.is_release_created == 'true'
    outputs:
      package_name: ${{ steps.meta.outputs.package_name }}
      package_version: ${{ steps.meta.outputs.package_version }}
      already_exists: ${{ steps.check_pypi.outputs.already_exists }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Write Git SHA to VERSION_SHA
        run: echo "${{ github.sha }}" > VERSION_SHA

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install packaging tools
        run: python -m pip install --upgrade build twine

      - name: Build wheel
        run: python -m build --wheel

      - name: Extract package metadata
        id: meta
        shell: bash
        run: |
          dist_file=$(ls dist/*.whl | head -n1)
          unzip -p "$dist_file" "*.dist-info/METADATA" > METADATA
          echo "package_name=$(grep '^Name:' METADATA | cut -d ' ' -f2-)" >> "$GITHUB_OUTPUT"
          echo "package_version=$(grep '^Version:' METADATA | cut -d ' ' -f2-)" >> "$GITHUB_OUTPUT"
          rm -f METADATA

      - name: Check if version already on PyPI
        id: check_pypi
        shell: bash
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/${{ steps.meta.outputs.package_name }}/${{ steps.meta.outputs.package_version }}/json")
          if [[ "$response" -eq 200 ]]; then
            echo "already_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Inspect built wheel
        shell: bash
        run: |
          dist_file=$(ls dist/*.whl 2>/dev/null | head -n1)
          if [[ -z "$dist_file" ]]; then
            echo "No wheel file found in ./dist"
            exit 1
          fi
          twine check "$dist_file"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v6
        with:
          name: wheel-dist
          path: dist/

  publish-to-pypi:
    runs-on: ubuntu-latest
    needs: prepare-pypi-publish
    if: needs.prepare-pypi-publish.outputs.already_exists == 'false'
    environment:
      name: pypi-release
      url: https://pypi.org/project/${{ needs.prepare-pypi-publish.outputs.package_name }}/
    steps:
      - name: Set PyPI token
        id: pypi_token
        shell: bash
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          PLAINSIGHT_PYPI_TOKEN: ${{ secrets.PLAINSIGHT_PYPI_TOKEN }}
        run: |
          token="$PYPI_API_TOKEN"
          if [[ -z "$token" ]]; then
            token="$PLAINSIGHT_PYPI_TOKEN"
          fi
          if [[ -z "$token" ]]; then
            echo "Provide either PYPI_API_TOKEN (canonical) or PLAINSIGHT_PYPI_TOKEN (legacy compatibility)."
            exit 1
          fi
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install twine
        run: python -m pip install --upgrade twine

      - name: Download wheel artifact
        uses: actions/download-artifact@v7
        with:
          name: wheel-dist
          path: dist/

      - name: Publish wheel to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ steps.pypi_token.outputs.token }}
        run: python -m twine upload dist/*.whl

  publish-docker:
    runs-on: ubuntu-latest
    needs: [create-release, prepare-pypi-publish, publish-to-pypi]
    if: needs.create-release.outputs.is_release_created == 'true' && (needs.publish-to-pypi.result == 'success' || needs.publish-to-pypi.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: "PreAction Disk-Cleanup"
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          sudo docker builder prune -a --force || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set Docker Hub token
        id: dockerhub_token
        shell: bash
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_ACCESS_TOKEN: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}
        run: |
          token="$DOCKERHUB_TOKEN"
          if [[ -z "$token" ]]; then
            token="$DOCKERHUB_ACCESS_TOKEN"
          fi
          if [[ -z "$token" ]]; then
            echo "Provide either DOCKERHUB_TOKEN or DOCKERHUB_ACCESS_TOKEN."
            exit 1
          fi
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ inputs.dockerhub_username }}
          password: ${{ steps.dockerhub_token.outputs.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.docker_image }}
          tags: |
            # Intentional dummy tag: we only consume labels from this action.
            type=raw,value=skip

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ inputs.docker_image }}:${{ needs.prepare-pypi-publish.outputs.package_version }}
            ${{ inputs.docker_image }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
