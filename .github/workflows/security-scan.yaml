name: Security Scan

on:
  workflow_call:
    inputs:
      python_versions:
        description: JSON array of Python versions to scan
        required: false
        type: string
        default: '["3.10", "3.11", "3.12", "3.13"]'
      grype_version:
        description: Grype version to use
        required: false
        type: string
        default: v0.103.0
      fail_on:
        description: Severity threshold to fail on (critical, high, medium, low)
        required: false
        type: string
        default: critical
      filter_name:
        description: Name passed to Grype --name (defaults to repository name)
        required: false
        type: string
      only_fixed:
        description: Only report vulnerabilities with known fixes
        required: false
        type: boolean
        default: true
      gcloud_auth:
        description: Enable GCloud auth for private dependency installation (premium/private filters)
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  grype:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ${{ fromJSON(inputs.python_versions) }}
    steps:
      - name: "PreAction Disk-Cleanup"
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a --force

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Authenticate to Google Cloud
        if: inputs.gcloud_auth
        uses: PlainsightAI/gh-actions/google-cloud-auth@main
        with:
          environment: production

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          make install

      - name: Resolve filter name
        id: filter_name
        shell: bash
        env:
          RAW_FILTER_NAME: ${{ inputs.filter_name }}
        run: |
          name="${RAW_FILTER_NAME:-${GITHUB_REPOSITORY##*/}}"
          if [[ "$name" == *$'\n'* || "$name" == *$'\r'* ]]; then
            echo "Invalid filter_name: must not contain newline characters" >&2
            exit 1
          fi
          printf 'name=%s\n' "$name" >> "$GITHUB_OUTPUT"

      - name: Download Grype
        uses: anchore/scan-action/download-grype@v3
        id: grype
        with:
          grype-version: ${{ inputs.grype_version }}

      - name: Run Grype security scan
        shell: bash
        env:
          GRYPE_CMD: ${{ steps.grype.outputs.cmd }}
          GRYPE_NAME: ${{ steps.filter_name.outputs.name }}
          FAIL_ON: ${{ inputs.fail_on }}
          ONLY_FIXED: ${{ inputs.only_fixed }}
        run: |
          args=(--name "$GRYPE_NAME" -o table --fail-on "$FAIL_ON")
          if [[ "$ONLY_FIXED" == "true" ]]; then
            args+=(--only-fixed)
          fi
          "$GRYPE_CMD" "${args[@]}" dir:.
