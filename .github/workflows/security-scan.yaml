name: Security Scan

on:
  workflow_call:
    inputs:
      python_versions:
        description: JSON array of Python versions to scan
        required: false
        type: string
        default: '["3.10", "3.11", "3.12", "3.13"]'
      grype_version:
        description: Grype version to use
        required: false
        type: string
        default: v0.103.0
      fail_on:
        description: Severity threshold to fail on (critical, high, medium, low)
        required: false
        type: string
        default: critical
      filter_name:
        description: Name passed to Grype --name (defaults to repository name)
        required: false
        type: string
      only_fixed:
        description: Only report vulnerabilities with known fixes
        required: false
        type: boolean
        default: true
      ignore_cves:
        description: >-
          Comma-separated CVE/GHSA IDs to ignore. These are written to a
          temporary .grype.yaml before the scan. The default ignores CVEs
          in transitive dependencies (e.g. ffmpeg bundled inside
          opencv-python-headless) that have no upstream fix yet.
        required: false
        type: string
        default: 'CVE-2026-40962'
      gcloud_auth:
        description: Enable GCloud auth for private dependency installation (premium/private filters)
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  grype:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ${{ fromJSON(inputs.python_versions) }}
    steps:
      - name: "PreAction Disk-Cleanup"
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          sudo docker builder prune -a --force || true

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Authenticate to Google Cloud
        if: inputs.gcloud_auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCLOUD_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCLOUD_GITHUB_CI_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        if: inputs.gcloud_auth
        uses: google-github-actions/setup-gcloud@v3

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          make install

      - name: Resolve filter name
        id: filter_name
        shell: bash
        env:
          RAW_FILTER_NAME: ${{ inputs.filter_name }}
        run: |
          name="${RAW_FILTER_NAME:-${GITHUB_REPOSITORY##*/}}"
          if [[ "$name" == *$'\n'* || "$name" == *$'\r'* ]]; then
            echo "Invalid filter_name: must not contain newline characters" >&2
            exit 1
          fi
          printf 'name=%s\n' "$name" >> "$GITHUB_OUTPUT"

      - name: Download Grype
        uses: anchore/scan-action/download-grype@v3
        id: grype
        with:
          grype-version: ${{ inputs.grype_version }}

      - name: Configure Grype ignores
        if: inputs.ignore_cves != ''
        shell: bash
        env:
          IGNORE_CVES: ${{ inputs.ignore_cves }}
        run: |
          # Write workflow ignores to a separate config file using a
          # YAML-aware merge (via Python's built-in yaml-safe subset)
          # so that appending ignore entries is correct regardless of
          # key ordering in an existing .grype.yaml.
          cfg="/tmp/grype-workflow.yaml"

          python3 - "$cfg" <<'PYEOF'
          import re, sys, os

          cfg_path = sys.argv[1]
          ignore_cves = os.environ["IGNORE_CVES"]

          # Parse and validate entries
          CVE_RE = re.compile(r"^CVE-\d{4}-\d+$")
          GHSA_RE = re.compile(r"^GHSA-[A-Za-z0-9]{4}-[A-Za-z0-9]{4}-[A-Za-z0-9]{4}$")

          entries = []
          for raw in ignore_cves.split(","):
              trimmed = raw.strip()
              if not trimmed:
                  continue
              if any(c in trimmed for c in "\n\r") or not trimmed.isprintable():
                  print(f"Invalid ignore_cves entry '{trimmed}': must not contain control characters", file=sys.stderr)
                  sys.exit(1)
              if not CVE_RE.match(trimmed) and not GHSA_RE.match(trimmed):
                  print(f"Invalid ignore_cves entry '{trimmed}': expected CVE-YYYY-NNNN... or GHSA-xxxx-xxxx-xxxx", file=sys.stderr)
                  sys.exit(1)
              entries.append(trimmed)

          if not entries:
              sys.exit(0)

          # Load existing config or start fresh
          existing_lines = []
          if os.path.isfile(".grype.yaml"):
              print("Found existing .grype.yaml — merging with workflow ignores")
              with open(".grype.yaml") as f:
                  existing_lines = f.readlines()

          # Match ignore: key in common YAML forms:
          #   "ignore:", "ignore: []", "ignore:  # comment", etc.
          IGNORE_KEY_RE = re.compile(r"^ignore:\s*(\[\s*\])?\s*(#.*)?$")

          ignore_idx = None
          for i, line in enumerate(existing_lines):
              if IGNORE_KEY_RE.match(line):
                  ignore_idx = i
                  break

          new_lines = [f"  - vulnerability: {e}\n" for e in entries]

          if ignore_idx is not None:
              # Rewrite the key line to block form if it was "ignore: []"
              existing_lines[ignore_idx] = "ignore:\n"
              # Insert after the ignore: key and any existing entries
              insert_at = ignore_idx + 1
              while insert_at < len(existing_lines) and existing_lines[insert_at].startswith("  "):
                  insert_at += 1
              for j, nl in enumerate(new_lines):
                  existing_lines.insert(insert_at + j, nl)
          else:
              existing_lines.append("ignore:\n")
              existing_lines.extend(new_lines)

          with open(cfg_path, "w") as f:
              f.writelines(existing_lines)

          print(f"Added {len(entries)} ignore(s): {', '.join(entries)}")
          PYEOF

          echo "GRYPE_CONFIG=$cfg" >> "$GITHUB_ENV"

      - name: Run Grype security scan
        shell: bash
        env:
          GRYPE_CMD: ${{ steps.grype.outputs.cmd }}
          GRYPE_NAME: ${{ steps.filter_name.outputs.name }}
          FAIL_ON: ${{ inputs.fail_on }}
          ONLY_FIXED: ${{ inputs.only_fixed }}
        run: |
          args=(--name "$GRYPE_NAME" -o table --fail-on "$FAIL_ON")
          if [[ "$ONLY_FIXED" == "true" ]]; then
            args+=(--only-fixed)
          fi
          if [[ -n "${GRYPE_CONFIG:-}" ]]; then
            args+=(--config "$GRYPE_CONFIG")
          fi
          "$GRYPE_CMD" "${args[@]}" dir:.
