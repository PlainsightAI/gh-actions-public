# cascade-pipeline-bumps.yaml — On a filter image release, open
# mechanical bump PRs against every consumer that pins that filter's
# image. Called as a `workflow_call` from filter-release.yaml (which is
# itself called by each filter-* repo's release workflow), so this fires
# once per filter-* release publish — no per-repo workflow file needed.
#
# The consumer set is hardcoded in the bump matrix below. Today it is a
# single repo (openfilter-pipelines-controller); the matrix shape is kept
# so adding a future consumer is a one-line diff. A resolve-check guards
# each entry (see the bump job) so a typo'd or deleted repo fails loud in
# its own shard instead of 404'ing on clone and paging a human — the
# failure mode that shipped `eval-demo-pipelines` in #19. The pin shapes
# each consumer uses are documented in docs/cascade/consumer-surface.md;
# the content-driven bump-strategy.sh adapts to whatever pins it finds.
#
# PLAT-1052: https://plainsight-ai.atlassian.net/browse/PLAT-1052
name: Cascade pipeline bumps

on:
  workflow_call:
    inputs:
      docker_image:
        description: |
          Docker image (`<repo>` without tag) of the just-published
          filter, e.g. `plainsightai/openfilter-faceblur`. Used to derive
          the filter_name (trailing path component) and the new image
          coordinate (combined with `version`).
        required: true
        type: string
      version:
        description: Bare release semver (e.g. `0.1.5`).
        required: true
        type: string
      dry_run:
        description: |
          Plan only — run the bump strategy and log which consumers
          would receive a PR, but do not call open-mechanical-pr.
          Surfaced only via workflow_dispatch on the caller; the
          release-driven path is always live.
        required: false
        type: boolean
        default: false
      single_consumer:
        description: |
          Restrict the cascade to one consumer (e.g.
          `PlainsightAI/jester-pipelines`). Useful for cautious rollout
          when a new bump strategy lands. Empty string = all consumers.
        required: false
        type: string
        default: ''
      auto_merge_override:
        description: |
          Open PRs but skip `gh pr merge --auto` enablement — leaves
          each PR open for manual merge. Smoke-testing only; the
          release-driven path defaults to auto-merge on.
        required: false
        type: boolean
        default: false
    secrets:
      GH_BOT_USER_PAT:
        description: |
          plainsight-bot PAT. Must have read access to every consumer
          repo (for clone) and write access (for push, PR creation,
          auto-merge enablement) via open-mechanical-pr. Also used by the
          notify job to claim the cross-repo fleet-dedup lock (a ref in
          gh-actions-public), so it needs contents:write there too.
        required: true
      SLACK_WEBHOOK_URL:
        description: |
          Incoming-webhook URL for the failure-notification Slack
          channel. Optional — when unset, the notify job skips the post
          and emits a warning. Scoped to private/internal repos, so the
          alert resolves only when this cascade runs in a private filter
          repo context (the live release path), not in public callers.
        required: false
  # Manual entry point for smoke-testing the cascade without cutting a
  # real filter release. Inputs mirror workflow_call; defaults bias
  # toward safe exercise (dry_run: true, auto_merge_override: true) so
  # an Actions-UI fire from gh-actions-public never opens or merges a
  # PR by accident. Secrets resolve from this repo's secret store, so
  # GH_BOT_USER_PAT must be configured on gh-actions-public.
  workflow_dispatch:
    inputs:
      docker_image:
        description: 'Docker image (`<repo>` without tag), e.g. `plainsightai/openfilter-faceblur`.'
        required: true
        type: string
      version:
        description: 'Bare release semver, e.g. `0.1.5`.'
        required: true
        type: string
      dry_run:
        description: Plan only — log planned bump PRs without calling open-mechanical-pr.
        required: false
        type: boolean
        default: true
      single_consumer:
        description: 'Restrict to one consumer (e.g. `PlainsightAI/jester-pipelines`). Empty = all.'
        required: false
        type: string
        default: ''
      auto_merge_override:
        description: Open PRs but skip auto-merge enablement (leaves PRs open for manual review).
        required: false
        type: boolean
        default: true

# Queue per upstream filter — a faceblur release should not cancel an
# in-flight frame-dedup cascade, but two faceblur releases firing close
# together (e.g. patch series) should serialize so the second's
# supersede-stale logic in open-mechanical-pr sees the first's PR.
concurrency:
  group: cascade-pipeline-bumps-${{ inputs.docker_image }}
  cancel-in-progress: false

jobs:
  # Phase 1 — derive cascade inputs. Extracts filter_name from
  # docker_image, builds new_image_coord, and decides whether to skip the
  # cascade entirely (a non-filter image → empty filter_name → no shards).
  # single_consumer filtering happens per-shard in `bump`.
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    outputs:
      filter_name: ${{ steps.derive.outputs.filter_name }}
      new_image_coord: ${{ steps.derive.outputs.new_image_coord }}
      release_url: ${{ steps.derive.outputs.release_url }}
    steps:
      - name: Derive cascade inputs
        id: derive
        env:
          DOCKER_IMAGE: ${{ inputs.docker_image }}
          VERSION: ${{ inputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Filter name = trailing path component of docker_image.
          # `plainsightai/openfilter-faceblur` → `openfilter-faceblur`.
          # Single-segment (no slash) is rejected — every filter image
          # we publish carries at minimum an org prefix.
          if [[ "${DOCKER_IMAGE}" != */* ]]; then
            echo "ERROR: docker_image='${DOCKER_IMAGE}' is single-segment; expected <namespace>/<filter-name>." >&2
            exit 1
          fi
          FILTER_NAME="${DOCKER_IMAGE##*/}"

          # Sanity gate — only cascade for filter image names. Public
          # (open) filters publish to DockerHub as `openfilter-<name>`;
          # private/premium filters publish to GAR as `filter-<name>`.
          # Accept both: this workflow rides the public filter-release.yaml
          # today (every pin openfilter-pipelines-controller tracks is an
          # `openfilter-*` coordinate), and matching `filter-*` too keeps
          # it correct if it is ever wired into the premium release path.
          # A non-filter image pushed through filter-release.yaml (e.g. a
          # docs image) falls through here to the no-op rather than
          # misfiring.
          if [[ "${FILTER_NAME}" != filter-* && "${FILTER_NAME}" != openfilter-* ]]; then
            echo "filter_name='${FILTER_NAME}' is not a filter image name (expected openfilter-* or filter-*); cascade is a no-op."
            echo "filter_name=" >> "$GITHUB_OUTPUT"
            echo "new_image_coord=" >> "$GITHUB_OUTPUT"
            echo "release_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEW_IMAGE_COORD="${DOCKER_IMAGE}:${VERSION}"
          # The publishing repo's release page is the natural pointer
          # for the PR body. `github.repository` is the caller's repo
          # when this workflow is invoked via workflow_call.
          RELEASE_URL="https://github.com/${REPO}/releases/tag/v${VERSION}"

          echo "filter_name=${FILTER_NAME}" >> "$GITHUB_OUTPUT"
          echo "new_image_coord=${NEW_IMAGE_COORD}" >> "$GITHUB_OUTPUT"
          echo "release_url=${RELEASE_URL}" >> "$GITHUB_OUTPUT"

  # Phase 2 — per-consumer bump. One matrix shard per consumer repo.
  # See docs/cascade/consumer-surface.md for the pin shapes each consumer
  # uses; the content-driven bump-strategy.sh adapts to whatever it finds.
  # To add a consumer, append a row below.
  bump:
    if: needs.prepare.outputs.filter_name != ''
    needs: [prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        consumer:
          - PlainsightAI/openfilter-pipelines-controller
    steps:
      - name: Skip if outside single_consumer scope
        id: scope
        env:
          CONSUMER: ${{ matrix.consumer }}
          SINGLE_CONSUMER: ${{ inputs.single_consumer }}
        run: |
          set -euo pipefail
          if [[ -n "${SINGLE_CONSUMER}" && "${SINGLE_CONSUMER}" != "${CONSUMER}" ]]; then
            echo "single_consumer='${SINGLE_CONSUMER}' set; skipping ${CONSUMER}."
            echo "in_scope=false" >> "$GITHUB_OUTPUT"
          else
            echo "in_scope=true" >> "$GITHUB_OUTPUT"
          fi

      # Fail loud if the matrix names a repo that doesn't resolve (typo
      # or deletion) instead of letting it 404 on clone and page a human.
      # This is the cheap guard that the hardcoded `eval-demo-pipelines`
      # row lacked in #19.
      - name: Verify consumer resolves
        if: steps.scope.outputs.in_scope == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_BOT_USER_PAT }}
          CONSUMER: ${{ matrix.consumer }}
        run: |
          set -euo pipefail
          if ! gh repo view "${CONSUMER}" --json name >/dev/null 2>&1; then
            echo "::error::Consumer '${CONSUMER}' does not resolve — fix or remove it from the bump matrix in cascade-pipeline-bumps.yaml." >&2
            exit 1
          fi

      - name: Prepare bump
        id: prep
        if: steps.scope.outputs.in_scope == 'true'
        uses: PlainsightAI/gh-actions-public/cascade-pipeline-bumps@main
        with:
          consumer_repo: ${{ matrix.consumer }}
          filter_name: ${{ needs.prepare.outputs.filter_name }}
          new_image_coord: ${{ needs.prepare.outputs.new_image_coord }}
          version: ${{ inputs.version }}
          release_url: ${{ needs.prepare.outputs.release_url }}
          gh_token: ${{ secrets.GH_BOT_USER_PAT }}

      - name: Log dry-run plan
        if: steps.scope.outputs.in_scope == 'true' && inputs.dry_run && steps.prep.outputs.has_changes == 'true'
        env:
          CONSUMER: ${{ matrix.consumer }}
          FILTER_NAME: ${{ needs.prepare.outputs.filter_name }}
          NEW_COORD: ${{ needs.prepare.outputs.new_image_coord }}
        run: |
          echo "DRY RUN: would open PR against ${CONSUMER} rewriting ${FILTER_NAME} pins to ${NEW_COORD}."

      - name: Open mechanical PR
        if: steps.scope.outputs.in_scope == 'true' && steps.prep.outputs.has_changes == 'true' && !inputs.dry_run
        uses: PlainsightAI/gh-actions-public/open-mechanical-pr@main
        with:
          repo: ${{ matrix.consumer }}
          working_directory: ${{ steps.prep.outputs.clone_dir }}
          # Per-filter prefix so the supersede-stale logic in
          # open-mechanical-pr scopes correctly — a faceblur release
          # should not close an in-flight frame-dedup bump PR.
          branch_prefix: bump-${{ needs.prepare.outputs.filter_name }}-
          commit_message: ${{ steps.prep.outputs.commit_message }}
          pr_title: ${{ steps.prep.outputs.pr_title }}
          pr_body: ${{ steps.prep.outputs.pr_body }}
          gh_token: ${{ secrets.GH_BOT_USER_PAT }}
          auto_merge: ${{ inputs.auto_merge_override && 'false' || 'true' }}

  # Phase 3 — Slack on failure, deduplicated across the fleet.
  #
  # This second-level cascade is invoked once per filter release, so a
  # production openfilter wave (~N filters) fires N independent runs in N
  # filter-repo Actions contexts. Concurrency groups are per-repo, so they
  # cannot coalesce — a naive per-run notify would multiply into N
  # near-identical alerts (the symptom that the eval-demo phantom made
  # impossible to miss: 8 filters × 1 phantom shard = 8 pages per release).
  #
  # Dedup via a cross-repo claim lock. The identity of a fleet-duplicated
  # failure is (consumer, failure_class, UTC hour) — the filter name and
  # version are deliberately excluded because they are the dimension we
  # are collapsing. We hash that identity and try to atomically create a
  # ref `refs/notify-claims/<hour>/<hash>` in gh-actions-public; git ref
  # creation is a compare-and-swap (201 on create, 422 if it exists), so
  # exactly one run in the wave wins the claim and posts. The hour is in
  # the ref *name* so gc-notify-claims.yaml can age stale locks out.
  #
  # Fail-open: if the claim API errors AND the ref does not already exist,
  # we post anyway — a duplicate alert is cheaper than a missed one.
  notify:
    if: failure()
    needs: [prepare, bump]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    env:
      HAS_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL != '' && 'true' || 'false' }}
      GH_TOKEN: ${{ secrets.GH_BOT_USER_PAT }}
      # Lock store: any repo the bot can write refs to. Refs hold no
      # secret material and live in a hidden namespace, so the public
      # gh-actions-public is fine and keeps the lock next to the workflow.
      OPS_REPO: PlainsightAI/gh-actions-public
      OPS_BRANCH: main
      # Single live consumer today; if the matrix grows, fold the failed
      # consumer(s) into the hash so distinct consumers alert separately.
      CONSUMER: PlainsightAI/openfilter-pipelines-controller
      PREPARE_RESULT: ${{ needs.prepare.result }}
    steps:
      - name: Claim fleet-dedup lock
        id: claim
        if: env.HAS_WEBHOOK == 'true'
        run: |
          set -uo pipefail
          # Guard: the dedup identity hardcodes CONSUMER to the single live
          # repo. If the bump matrix ever grows a second consumer without the
          # hash being updated to fold it in, a failure from the new consumer
          # would claim under this key and be silently suppressed. Read the
          # matrix straight from the running workflow definition (the single
          # source of truth) and, if it names more than one consumer, fail
          # open: skip dedup and post unconditionally, flagging the drift loud.
          # Distinguish three failure modes so an operator isn't sent to
          # investigate a phantom matrix change: (a) the fetch blipped, (b) the
          # matrix block couldn't be located (reformat / commented-out rows),
          # (c) genuine drift to >1 consumer. All three fail open (post=true);
          # only (c) is a real "fold it into the hash" action item.
          WF_YAML="$(gh api "repos/${OPS_REPO}/contents/.github/workflows/cascade-pipeline-bumps.yaml?ref=${OPS_BRANCH}" --jq '.content' 2>/dev/null | tr -d '\n' | base64 -d 2>/dev/null)"
          if [ -z "${WF_YAML}" ]; then
            echo "::warning::could not read bump matrix (transient ${OPS_REPO} contents fetch failure or empty body); posting without dedup. Not a matrix change — no action needed unless this recurs."
            echo "post=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Track whether the matrix block was found at all (f_seen),
          # separately from how many consumers it lists (n).
          CONSUMER_COUNT="$(printf '%s' "${WF_YAML}" \
            | awk '/^        consumer:/{f=1; f_seen=1; next} f && /^          - /{n++; next} f && !/^[[:space:]]*$/{f=0} END{print (f_seen ? n+0 : "nomatch")}')"
          if [ "${CONSUMER_COUNT}" = "nomatch" ]; then
            echo "::warning::bump matrix block not found in the workflow definition (likely a reformat or commented-out rows changed the indentation the parser keys on); posting without dedup. Verify the matrix shape, not the dedup identity."
            echo "post=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${CONSUMER_COUNT}" != "1" ]; then
            echo "::error::bump matrix has ${CONSUMER_COUNT} consumers but the notify dedup identity hardcodes a single CONSUMER (${CONSUMER}); fold the failed consumer into the hash. Posting without dedup to avoid suppressing a distinct consumer's failure."
            echo "post=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Coarse failure class, cheaply available from job results:
          # a prepare failure (bad input/derive) is a different identity
          # from a bump failure (clone/strategy/PR against the consumer).
          FAILURE_CLASS="bump"
          [ "${PREPARE_RESULT}" = "failure" ] && FAILURE_CLASS="prepare"

          BUCKET="$(date -u +%Y%m%d%H)"
          HASH="$(printf '%s|%s' "${CONSUMER}" "${FAILURE_CLASS}" | sha256sum | cut -c1-32)"
          REF_SHORT="notify-claims/${BUCKET}/${HASH}"

          SHA="$(gh api "repos/${OPS_REPO}/git/ref/heads/${OPS_BRANCH}" --jq '.object.sha')"

          post=true
          if gh api -X POST "repos/${OPS_REPO}/git/refs" \
               -f ref="refs/${REF_SHORT}" -f sha="${SHA}" >/dev/null 2>&1; then
            echo "Won claim ${REF_SHORT}; posting."
          elif gh api "repos/${OPS_REPO}/git/ref/${REF_SHORT}" >/dev/null 2>&1; then
            post=false
            echo "Claim ${REF_SHORT} already held by a sibling run; skipping duplicate Slack."
          else
            echo "::warning::Claim API failed and ref absent; failing open and posting to avoid a missed alert."
          fi
          echo "post=${post}" >> "$GITHUB_OUTPUT"

      - name: Slack on failure
        if: env.HAS_WEBHOOK == 'true' && steps.claim.outputs.post == 'true'
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  text: ":openfilter: pipeline-bump cascade errored"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "Cascading `${{ needs.prepare.outputs.filter_name || inputs.docker_image }}` `${{ inputs.version }}` to filter-pin consumers failed. A human needs to investigate before the next release, otherwise consumers will not pick up the new image. _Deduplicated across the release wave — other filters may have hit the same failure._"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "Release: <${{ needs.prepare.outputs.release_url || format('https://github.com/{0}', github.repository) }}|${{ needs.prepare.outputs.filter_name || inputs.docker_image }} ${{ inputs.version }}>"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "Workflow: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.workflow }} – Run #${{ github.run_number }}>"
      - name: Note missing webhook
        if: env.HAS_WEBHOOK == 'false'
        run: |
          echo "::warning::SLACK_WEBHOOK_URL not configured; cascade failure goes unnotified on Slack — visible only in the Actions run summary."
