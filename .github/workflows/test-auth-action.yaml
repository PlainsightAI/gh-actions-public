name: Test Google Cloud Auth Action

on:
  # For manual testing
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test (development, staging, production)'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production
  # Run on every PR with changes in specific paths
  pull_request:
    paths:
      - 'google-cloud-auth/**'
      - '.github/workflows/test-auth-action.yaml'

jobs:
  test-auth:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ github.event_name == 'pull_request' && fromJson('["development", "staging", "production"]') || fromJson(format('["{0}"]', github.event.inputs.environment)) }}
    permissions:
      contents: read
      id-token: write  # Required for workload identity federation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test Google Cloud Auth Action
        uses: ./google-cloud-auth  # Uses the local action
        with:
          environment: ${{ matrix.environment }}

      # Add a simple test to verify authentication worked
      - name: Verify Authentication
        run: |
          gcloud auth list
          gcloud projects list
          echo "Authentication successful for ${{ matrix.environment }} environment!"
